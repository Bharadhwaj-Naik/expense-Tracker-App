<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>Good Morning , Sunny ...!!</h1>
        <div class="header-controls">
            <div class="dropdown">
                Daily <i class="fas fa-chevron-down"></i>
            </div>
            <div class="date-picker">
                <i class="fas fa-calendar"></i>
                26-june-2026
            </div>
            <div class="export-btn">
                <i class="fas fa-download"></i>
                Export
            </div>

        </div>
    </header>

    <main class="main-content">
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Monthly Income</h3>
                    <button class="card-menu">
                        <i class="fas fa-ellipsis-h"></i>
                    </button>
                </div>
                <div class="amount income-amount">$2,345.00</div>
                <div class="change">
                    <i class="fas fa-arrow-up"></i>
                    12% vs LastMonth
                </div>
            </div>
            
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Monthly Expenses</h3>
                    <button class="card-menu">
                        <i class="fas fa-ellipsis-h"></i>
                    </button>
                </div>
                <div class="amount income-amount">$1,845.00</div>
                <div class="change">
                    <i class="fas fa-arrow-up"></i>
                    12% vs LastMonth
                </div>
            </div>
            <div class="card my-card">
                <div class="card-header">
                    <h3 class="card-title">My Card</h3>
                    <button class="card-menu" style="color:white;">
                        <i class="fas fa-ellipsis-h"></i>
                    </button>
                </div>
                <div style="opacity:0.9; font-size:0.85rem ; margin-bottom:1rem ;">Linked to your Primary Wallet</div>
                <div class="card-chip"></div>
                <div class="card-number">5432 2735 0037 0015</div>
                <div class="card-holder">Sunny</div>
                <div class="card-logo">
                    <div class="card-logo-circle logo-red"></div>
                    <div class="card-logo-circle logo-orange"></div>
                </div>

                <div class="spending-section">
                    <div style="margin-bottom: 0.5rem ; font-size: 0.875rem; opacity :0.9;">Spending Limit</div>
                    <div class="spending-limit">$4,564.00</div>
                    <div class="spending-used">Used From $15,564.00</div>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        
    </main>



    <script src="script.js"></script>
</body>

</html>
